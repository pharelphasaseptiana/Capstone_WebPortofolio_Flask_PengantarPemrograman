{% extends 'base.html' %}
{% block title %}Kelola Proyek{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
<h2>Kelola Proyek</h2>
<a href="{{ url_for('add_project') }}" class="btn btn-success">+ Tambah Proyek</a>
</div>
<div class="table-responsive">
<table class="table table-striped">
<thead><tr><th>Gambar</th><th>Judul</th><th>Teknologi</th><th>Aksi</th></tr></thead>
<tbody>
{% for p in projects %}
<tr>
<td><img src="{{ p.image_file | photo_url }}" width="50" height="50" style="object-fit:cover"></td>
<td>{{ p.title }}</td>
<td>{{ p.technologies }}</td>
<td>
<a href="{{ url_for('edit_project', id=p.id) }}" class="btn btn-sm btn-warning">Edit</a>
<form action="{{ url_for('delete_project', id=p.id) }}" method="POST" style="display:inline" onsubmit="return confirm('Yakin hapus?')">
<button type="submit" class="btn btn-sm btn-danger">Hapus</button>
</form>
</td>
</tr>
{% else %}
<tr><td colspan="4" class="text-center">Belum ada proyek.</td></tr>
{% endfor %}
</tbody>
</table>
</div>
<a href="{{ url_for('dashboard') }}" class="btn btn-secondary mt-3">Kembali</a>
{% endblock %}
